<!DOCTYPE html>
<html>

<head>

<title>ISP Bot Admin</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

textarea{
width:100%;
height:80px;
}

button{
margin-top:10px;
padding:10px;
}

.node{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:8px;
}

</style>

</head>

<body>

<h2>ISP Bot Admin Panel</h2>

<div id="nodes"></div>

<script>

async function loadFlows(){

const res = await fetch("http://localhost:3000/flows")
const data = await res.json()

renderFlows(data)

}

function renderFlows(flows){

const container = document.getElementById("nodes")

container.innerHTML=""

Object.keys(flows).forEach(node=>{

const div = document.createElement("div")

div.className="node"

div.innerHTML=`
<h3>${node}</h3>
<textarea id="${node}">${flows[node].message}</textarea>
<button onclick="saveNode('${node}')">Guardar</button>
`

container.appendChild(div)

})

}

async function saveNode(node){

const text = document.getElementById(node).value

await fetch("http://localhost:3000/update",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
node:node,
message:text
})

})

alert("Guardado")

}

loadFlows()

</script>

</body>

</html>
